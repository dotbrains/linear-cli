<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5E6AD2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#5E6AD2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Linear logo icon -->
  <g transform="translate(80, 155)">
    <rect width="100" height="100" rx="22" fill="url(#logoGradient)"/>
    <!-- Linear mark: diagonal lines radiating from bottom-left -->
    <g transform="translate(50, 50)" stroke="white" stroke-width="4" stroke-linecap="round" fill="none">
      <line x1="-28" y1="28" x2="-22" y2="22" />
      <line x1="-28" y1="18" x2="-12" y2="28" />
      <line x1="-28" y1="8" x2="-2" y2="28" />
      <line x1="-28" y1="-2" x2="8" y2="28" />
      <line x1="-28" y1="-12" x2="18" y2="28" />
      <line x1="-28" y1="-22" x2="28" y2="28" />
      <line x1="-18" y1="-28" x2="28" y2="18" />
      <line x1="-8" y1="-28" x2="28" y2="8" />
      <line x1="2" y1="-28" x2="28" y2="-2" />
      <line x1="12" y1="-28" x2="28" y2="-12" />
      <line x1="22" y1="-28" x2="28" y2="-22" />
    </g>
  </g>

  <!-- Main heading -->
  <text x="210" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="700" fill="white" letter-spacing="-1">
    linear-cli
  </text>

  <!-- Subtitle (two lines to avoid overlap) -->
  <text x="80" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" fill="#94a3b8" letter-spacing="0">
    Search, manage, and automate
  </text>
  <text x="80" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" fill="#94a3b8" letter-spacing="0">
    Linear from the command line.
  </text>

  <!-- Feature highlights -->
  <g transform="translate(80, 380)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="130" height="40" rx="20" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
    <text x="65" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#818cf8" text-anchor="middle">
      Search
    </text>

    <!-- Badge 2 -->
    <rect x="145" y="0" width="130" height="40" rx="20" fill="#1e293b" stroke="#5E6AD2" stroke-width="1.5"/>
    <text x="210" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#5E6AD2" text-anchor="middle">
      Issues
    </text>

    <!-- Badge 3 -->
    <rect x="290" y="0" width="155" height="40" rx="20" fill="#1e293b" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="367" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#a5b4fc" text-anchor="middle">
      Comments
    </text>

    <!-- Badge 4 -->
    <rect x="0" y="55" width="130" height="40" rx="20" fill="#1e293b" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="65" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#c7d2fe" text-anchor="middle">
      Labels
    </text>

    <!-- Badge 5 -->
    <rect x="145" y="55" width="155" height="40" rx="20" fill="#1e293b" stroke="#e0e7ff" stroke-width="1.5"/>
    <text x="222" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#e0e7ff" text-anchor="middle">
      Claude Skill
    </text>
  </g>

  <!-- Code snippet decoration -->
  <g transform="translate(660, 155)">
    <rect width="470" height="280" rx="12" fill="#0f1117" stroke="#2d3748" stroke-width="2"/>

    <!-- Code header -->
    <rect width="470" height="40" rx="12" fill="#1e293b"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="40" cy="20" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="60" cy="20" r="5" fill="#10b981" opacity="0.8"/>

    <!-- Code content -->
    <text x="20" y="80" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#818cf8" font-weight="500">$ linear-cli search "auth bug"</text>
    <text x="20" y="108" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ 3 issues found</text>

    <text x="20" y="148" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#818cf8" font-weight="500">$ linear-cli issue ENG-123</text>
    <text x="20" y="176" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#94a3b8">→ Fix authentication race condition</text>

    <text x="20" y="216" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="14" fill="#818cf8" font-weight="500">$ linear-cli comment-add ENG-123</text>
    <text x="20" y="244" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#10b981">✓ Comment added</text>
  </g>

  <!-- Bottom accent -->
  <rect y="626" width="1200" height="4" fill="url(#accentGradient)"/>
</svg>
